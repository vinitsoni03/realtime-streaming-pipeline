<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700">
  <!-- SVG Architecture Diagram -->
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.06"></feDropShadow>
    </filter>
    <filter id="primaryShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#10B981" flood-opacity="0.15"></feDropShadow>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"></stop>
      <stop offset="100%" stop-color="#F1F5F9"></stop>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"></stop>
      <stop offset="100%" stop-color="#10B981"></stop>
    </linearGradient>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"></rect>

  <text x="700" y="85" text-anchor="middle" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="40" font-weight="700" fill="#0F172A">Real-Time Data Streaming Pipeline</text>
  <text x="700" y="130" text-anchor="middle" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#64748B">High-throughput, fault-tolerant stream processing with near real-time analytics</text>

  <rect x="90" y="305" width="1220" height="3" rx="1.5" fill="#E2E8F0"></rect>

  <g transform="translate(90, 165)">
    <rect width="260" height="280" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"></rect>
    <rect x="0" y="0" width="260" height="65" rx="16" ry="16" fill="#0284C7"></rect>
    <text x="130" y="42" text-anchor="middle" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Ingestion</text>
    <g transform="translate(30, 95)">
      <circle cx="0" cy="10" r="4" fill="#0284C7"></circle>
      <text x="16" y="15" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Data Producers</text>
      <circle cx="0" cy="55" r="4" fill="#0284C7"></circle>
      <text x="16" y="60" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Python / Boto3</text>
      <circle cx="0" cy="100" r="4" fill="#0284C7"></circle>
      <text x="16" y="105" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">IoT Devices</text>
      <circle cx="0" cy="145" r="4" fill="#0284C7"></circle>
      <text x="16" y="150" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Log Aggregators</text>
    </g>
  </g>

  <g transform="translate(370, 300)">
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"></circle>
    <circle cx="0" cy="0" r="4" fill="#0284C7"></circle>
    <line x1="8" y1="0" x2="45" y2="0" stroke="#94A3B8" stroke-width="3"></line>
    <path d="M45 -6 L58 0 L45 6" fill="#94A3B8"></path>
  </g>

  <g transform="translate(385, 145)">
    <rect width="260" height="320" rx="16" ry="16" fill="#FFFFFF" stroke="#10B981" stroke-width="4" filter="url(#primaryShadow)"></rect>
    <rect x="0" y="0" width="260" height="65" rx="16" ry="16" fill="url(#primaryGrad)"></rect>
    <text x="130" y="42" text-anchor="middle" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Streaming</text>
    <g transform="translate(30, 95)">
      <circle cx="0" cy="10" r="4" fill="#059669"></circle>
      <text x="16" y="15" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Amazon Kinesis</text>
      <circle cx="0" cy="55" r="4" fill="#059669"></circle>
      <text x="16" y="60" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Data Streams</text>
      <circle cx="0" cy="100" r="4" fill="#059669"></circle>
      <text x="16" y="105" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Shards & Partitions</text>
      <circle cx="0" cy="145" r="4" fill="#059669"></circle>
      <text x="16" y="150" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Event Routing</text>
      <circle cx="0" cy="190" r="4" fill="#059669"></circle>
      <text x="16" y="195" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Stream Analytics</text>
    </g>
  </g>

  <g transform="translate(665, 300)">
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"></circle>
    <circle cx="0" cy="0" r="4" fill="#059669"></circle>
    <line x1="8" y1="0" x2="45" y2="0" stroke="#94A3B8" stroke-width="3"></line>
    <path d="M45 -6 L58 0 L45 6" fill="#94A3B8"></path>
  </g>

  <g transform="translate(680, 165)">
    <rect width="260" height="280" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"></rect>
    <rect x="0" y="0" width="260" height="65" rx="16" ry="16" fill="#0F172A"></rect>
    <text x="130" y="42" text-anchor="middle" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Processing</text>
    <g transform="translate(30, 95)">
      <circle cx="0" cy="10" r="4" fill="#0F172A"></circle>
      <text x="16" y="15" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">AWS Lambda</text>
      <circle cx="0" cy="55" r="4" fill="#0F172A"></circle>
      <text x="16" y="60" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Event Processing</text>
      <circle cx="0" cy="100" r="4" fill="#0F172A"></circle>
      <text x="16" y="105" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Transformation</text>
      <circle cx="0" cy="145" r="4" fill="#0F172A"></circle>
      <text x="16" y="150" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Enrichment</text>
    </g>
  </g>

  <g transform="translate(960, 300)">
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"></circle>
    <circle cx="0" cy="0" r="4" fill="#0F172A"></circle>
    <line x1="8" y1="0" x2="45" y2="0" stroke="#94A3B8" stroke-width="3"></line>
    <path d="M45 -6 L58 0 L45 6" fill="#94A3B8"></path>
  </g>

  <g transform="translate(975, 165)">
    <rect width="260" height="280" rx="16" ry="16" fill="#FFFFFF" filter="url(#cardShadow)"></rect>
    <rect x="0" y="0" width="260" height="65" rx="16" ry="16" fill="#7FBA00"></rect>
    <text x="130" y="42" text-anchor="middle" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Storage</text>
    <g transform="translate(30, 95)">
      <circle cx="0" cy="10" r="4" fill="#7FBA00"></circle>
      <text x="16" y="15" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Amazon S3</text>
      <circle cx="0" cy="55" r="4" fill="#7FBA00"></circle>
      <text x="16" y="60" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Data Lake</text>
      <circle cx="0" cy="100" r="4" fill="#7FBA00"></circle>
      <text x="16" y="105" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Batch Processing</text>
      <circle cx="0" cy="145" r="4" fill="#7FBA00"></circle>
      <text x="16" y="150" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#334155">Analytics</text>
    </g>
  </g>

  <g transform="translate(1105, 450)">
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"></circle>
    <circle cx="0" cy="0" r="4" fill="#7FBA00"></circle>
    <line x1="0" y1="8" x2="0" y2="45" stroke="#94A3B8" stroke-width="3"></line>
    <path d="M-6 45 L0 58 L6 45" fill="#94A3B8"></path>
  </g>

  <g transform="translate(90, 500)">
    <rect width="1220" height="170" rx="20" ry="20" fill="#FFFFFF" filter="url(#cardShadow)"></rect>
    <rect x="0" y="0" width="1220" height="70" rx="20" ry="20" fill="#7C3AED"></rect>
    <text x="610" y="45" text-anchor="middle" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">Core Services</text>
    <g transform="translate(50, 95)">
      <circle cx="0" cy="10" r="4" fill="#7C3AED"></circle>
      <text x="16" y="15" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#334155">AWS IAM (Security)</text>
      <circle cx="0" cy="50" r="4" fill="#7C3AED"></circle>
      <text x="16" y="55" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#334155">Amazon CloudWatch</text>
      <circle cx="280" cy="10" r="4" fill="#7C3AED"></circle>
      <text x="296" y="15" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#334155">Dead-Letter Queue (SQS)</text>
      <circle cx="280" cy="50" r="4" fill="#7C3AED"></circle>
      <text x="296" y="55" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#334155">Observability Stack</text>
      <circle cx="560" cy="10" r="4" fill="#7C3AED"></circle>
      <text x="576" y="15" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#334155">Infrastructure as Code</text>
      <circle cx="560" cy="50" r="4" fill="#7C3AED"></circle>
      <text x="576" y="55" font-family="Inter, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#334155">CI/CD Pipelines</text>
    </g>
  </g>
</svg>